# Experiment 1 – Complete graph (fully-connected directed topology)
#
# Structural properties and why they matter:
#
#   Every pair of nodes is connected by a directed edge in both directions,
#   giving out-degree = n-1 for every node.
#
#   Lai-Yang: A complete graph produces the maximum number of in-transit
#   channels.  When the initiator turns red every non-initiator has already
#   received at least one white message from each neighbor, so the channel-
#   state recording logic captures real in-transit messages rather than
#   recording empty channels.  This is the stress test for the snapshot.
#
#   Echo: The Extinguish path is exercised heavily because every non-root
#   node receives the Wave from multiple parents simultaneously.  On a
#   complete 6-node graph, a non-root receives 5 Waves and sends 4
#   Extinguish replies plus 1 Echo.
#
# Generator parameters:
#   shape     = complete  – all n*(n-1) directed edges present
#   nodeCount = 6         – small enough to read logs, large enough to
#                           trigger multi-parent Echo collisions
#   seed      = 1001      – fixed for reproducibility

sim.generator {
  shape        = "complete"
  nodeCount    = 6
  seed         = 1001
  allowedTypes = ["CONTROL", "PING", "GOSSIP", "WORK", "ACK"]
  defaultPdf {
    family       = "uniform"
    messageTypes = ["CONTROL", "PING", "GOSSIP", "WORK", "ACK"]
  }
}