# Experiment 4 – NetGameSim-generated graph
#
# This experiment loads the topology from the NetGameSim graph artifact
# at outputs/netgamesim-graph.json rather than generating it programmatically.
#
# The graph was produced by NetGameSim (https://github.com/0x1DOCD00D/NetGameSim)
# and has 8 nodes and 18 directed edges with varying edge weights.
#
# To load it, use NetGameSimLoader instead of GraphLoader:
#
#   NetGameSimLoader.loadFromFile("outputs/netgamesim-graph.json") match {
#     case Right(topology) => ExperimentRunner.runTopologyExperiment(...)
#     case Left(errors)    => ...
#   }
#
# This config provides the sim.traffic block so timer and input nodes
# are configured when the experiment is run via NetGameSimExperiment.

sim.traffic {
  seed = 2026

  timers = [
    { node = "node-0", tickEveryMs = 300, mode = "pdf" },
    { node = "node-4", tickEveryMs = 500, mode = "fixed", fixedMsg = "WORK" }
  ]

  inputs = [
    { node = "node-2" },
    { node = "node-6" }
  ]
}
