# Experiment 2 – Bidirectional ring graph
#
# Structural properties and why they matter:
#
#   A bidirectional ring gives every node out-degree = 2 and in-degree = 2.
#   Each node connects to both its successor and predecessor, so reply
#   messages (Echo, Extinguish) can always travel back to their sender.
#
#   A unidirectional ring breaks Echo because node-1 (root) cannot send
#   Extinguish back to node-8 — node-8 is only an inbound neighbor and
#   node-1 has no outgoing edge to it.  Making the ring bidirectional
#   fixes this while keeping the sparse, low-degree character of the
#   topology compared to the complete graph experiment.
#
#   Echo on a bidirectional ring: node-1 sends Wave to both node-2 and
#   node-8.  Each path travels around its half of the ring.  Nodes that
#   receive the wave from two directions send Extinguish on the second
#   arrival.  This exercises both the forwarding path and the Extinguish
#   path in a single run with a very sparse topology.
#
#   Lai-Yang on a bidirectional ring: each node has exactly 2 inbound
#   channels, so the snapshot completes as soon as both channels are
#   closed.  This is a clean low-noise test of the color-flip mechanism.
#
# Note: The ring generator only builds unidirectional edges, so this
# experiment uses an explicit sim.graph block for full control over
# edge direction.  Seed 1002 is preserved in a comment for reference.
# seed = 1002

sim.graph {
  nodes = [
    { id = "node-1", pdf { family = "zipf", messageTypes = ["CONTROL","PING","GOSSIP"], exponent = 1.2 } }
    { id = "node-2", pdf { family = "zipf", messageTypes = ["CONTROL","PING","GOSSIP"], exponent = 1.2 } }
    { id = "node-3", pdf { family = "zipf", messageTypes = ["CONTROL","PING","GOSSIP"], exponent = 1.2 } }
    { id = "node-4", pdf { family = "zipf", messageTypes = ["CONTROL","PING","GOSSIP"], exponent = 1.2 } }
    { id = "node-5", pdf { family = "zipf", messageTypes = ["CONTROL","PING","GOSSIP"], exponent = 1.2 } }
    { id = "node-6", pdf { family = "zipf", messageTypes = ["CONTROL","PING","GOSSIP"], exponent = 1.2 } }
    { id = "node-7", pdf { family = "zipf", messageTypes = ["CONTROL","PING","GOSSIP"], exponent = 1.2 } }
    { id = "node-8", pdf { family = "zipf", messageTypes = ["CONTROL","PING","GOSSIP"], exponent = 1.2 } }
  ]

  edges = [
    # Forward ring: node-1 -> node-2 -> ... -> node-8 -> node-1
    { from = "node-1", to = "node-2", allow = ["CONTROL","PING","GOSSIP"] }
    { from = "node-2", to = "node-3", allow = ["CONTROL","PING","GOSSIP"] }
    { from = "node-3", to = "node-4", allow = ["CONTROL","PING","GOSSIP"] }
    { from = "node-4", to = "node-5", allow = ["CONTROL","PING","GOSSIP"] }
    { from = "node-5", to = "node-6", allow = ["CONTROL","PING","GOSSIP"] }
    { from = "node-6", to = "node-7", allow = ["CONTROL","PING","GOSSIP"] }
    { from = "node-7", to = "node-8", allow = ["CONTROL","PING","GOSSIP"] }
    { from = "node-8", to = "node-1", allow = ["CONTROL","PING","GOSSIP"] }

    # Backward ring: enables Echo/Extinguish replies to travel back
    { from = "node-1", to = "node-8", allow = ["CONTROL","PING","GOSSIP"] }
    { from = "node-8", to = "node-7", allow = ["CONTROL","PING","GOSSIP"] }
    { from = "node-7", to = "node-6", allow = ["CONTROL","PING","GOSSIP"] }
    { from = "node-6", to = "node-5", allow = ["CONTROL","PING","GOSSIP"] }
    { from = "node-5", to = "node-4", allow = ["CONTROL","PING","GOSSIP"] }
    { from = "node-4", to = "node-3", allow = ["CONTROL","PING","GOSSIP"] }
    { from = "node-3", to = "node-2", allow = ["CONTROL","PING","GOSSIP"] }
    { from = "node-2", to = "node-1", allow = ["CONTROL","PING","GOSSIP"] }
  ]
}