# Experiment 3 – Sparse random directed graph (Erdos–Renyi G(n,p))
#
# Structural properties and why they matter:
#
#   A sparse graph with edgeProb = 0.35 produces roughly 35% of the edges
#   that a complete graph would have.  The generator guarantees strong
#   connectivity by adding a directed spanning cycle after the random phase,
#   so the algorithms always terminate.  Average out-degree is approximately
#   0.35 * (n-1) + ~1 from the spanning-cycle supplement.
#
#   Lai-Yang: Most channels carry no in-transit messages (they are simply
#   absent).  The ones that do exist vary in activity level because the Zipf
#   PDF concentrates traffic on PING while WORK is rare.  This tests that
#   the snapshot correctly records empty channel states for missing edges
#   and non-empty states for active ones.
#
#   Echo: Some nodes have out-degree 1 (only the spanning-cycle edge), which
#   forces them to become leaves in the spanning tree and send their Echo
#   immediately.  Other nodes have higher degree and must collect replies
#   from several children.  The mix of leaf and interior nodes exercises
#   both branches of the Echo handler in a single run.
#
# Generator parameters:
#   shape     = sparse    – Erdos–Renyi G(10, 0.35) + spanning cycle
#   nodeCount = 10        – larger graph to expose degree heterogeneity
#   edgeProb  = 0.35      – ~31% edge density before cycle edges
#   seed      = 1003      – fixed seed for reproducibility; change to explore
#                           different random topologies

sim.generator {
  shape        = "sparse"
  nodeCount    = 10
  edgeProb     = 0.35
  seed         = 1003
  allowedTypes = ["CONTROL", "PING", "WORK"]
  defaultPdf {
    family       = "explicit"
    weights {
      CONTROL = 0.20
      PING    = 0.60
      WORK    = 0.20
    }
  }
}
