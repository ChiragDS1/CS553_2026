akka {
  loglevel = "INFO"

  actor {
    provider = "local"

    serialization-bindings {
      "com.uic.cs553.distributed.framework.DistributedMessage" = jackson-json
    }
  }

  coordinated-shutdown {
    exit-jvm = on
  }
}

# ---------------------------------------------------------------------------
# Lightbend Telemetry (Cinnamon) — intended configuration
#
# This block documents the Cinnamon instrumentation that would be active if
# the Cinnamon runtime jars were available (requires a Lightbend subscription
# token).  The actor selection and reporter settings below match the rubric
# requirements: all /user/* actors instrumented, metrics logged every 10s.
#
# To activate: obtain a token from https://akka.io/token, add credentials,
# uncomment the plugin in project/plugins.sbt, and add Cinnamon.library.*
# dependencies to build.sbt.
# ---------------------------------------------------------------------------
cinnamon {
  akka.actors {
    default-by-class {
      includes = "/user/*"
      report-by = class
    }
  }

  akka.dispatchers {
    basic-information {
      includes = "*"
    }
    time-information {
      includes = "*"
    }
  }

  chmetrics {
    reporters += "metrics-slf4j-reporter"
  }

  metrics-slf4j-reporter {
    interval = 10 seconds
  }
}

# ---------------------------------------------------------------------------
# Kamon instrumentation — active open-source metrics layer
#
# Kamon instruments Akka actors, dispatchers, and JVM internals without code
# changes.  The kanela agent (bundled inside kamon-bundle) is loaded at JVM
# startup via the Java instrumentation API.
#
# During a run, metrics appear in the log every 10 seconds.
# Search for: [kamon.instrumentation] or [kamon.system]
# ---------------------------------------------------------------------------
kamon {
  environment {
    service = "distributed-algorithms-sim"
  }

  metric {
    tick-interval = 10 seconds
  }

  reporters = ["kamon.logback.LogbackReporter"]

  instrumentation {
    akka {
      actors {
        # Instrument all actors in the default dispatcher.
        track-activity-threshold = 0
      }
      dispatchers {
        track-default-dispatcher = yes
      }
    }
  }
}