sim.graph {
  nodes = [
    {
      id = "node-1"
      pdf {
        family = "uniform"
        messageTypes = ["CONTROL", "WHITE", "RED", "WAVE", "ECHO", "EXT"]
      }
    },
    {
      id = "node-2"
      pdf {
        family = "uniform"
        messageTypes = ["CONTROL", "WHITE", "RED", "WAVE", "ECHO", "EXT"]
      }
    },
    {
      id = "node-3"
      pdf {
        family = "uniform"
        messageTypes = ["CONTROL", "WHITE", "RED", "WAVE", "ECHO", "EXT"]
      }
    },
    {
      id = "node-4"
      pdf {
        family = "uniform"
        messageTypes = ["CONTROL", "WHITE", "RED", "WAVE", "ECHO", "EXT"]
      }
    },
    {
      id = "node-5"
      pdf {
        family = "uniform"
        messageTypes = ["CONTROL", "WHITE", "RED", "WAVE", "ECHO", "EXT"]
      }
    }
  ]

  edges = [
    # node-1 can send everything to everyone
    { from = "node-1", to = "node-2", allow = ["CONTROL", "WHITE", "RED", "WAVE", "ECHO", "EXT"] }
    { from = "node-1", to = "node-3", allow = ["CONTROL", "WHITE", "RED", "WAVE", "ECHO", "EXT"] }
    { from = "node-1", to = "node-4", allow = ["CONTROL", "WHITE", "RED", "WAVE", "ECHO", "EXT"] }
    { from = "node-1", to = "node-5", allow = ["CONTROL", "WHITE", "RED", "WAVE", "ECHO", "EXT"] }

    # Back edges to node-1: forbid WAVE, allow ECHO/EXT/WHITE/RED
    { from = "node-2", to = "node-1", allow = ["CONTROL", "WHITE", "RED", "ECHO", "EXT"] }
    { from = "node-3", to = "node-1", allow = ["CONTROL", "WHITE", "RED", "ECHO", "EXT"] }
    { from = "node-4", to = "node-1", allow = ["CONTROL", "WHITE", "RED", "ECHO", "EXT"] }
    { from = "node-5", to = "node-1", allow = ["CONTROL", "WHITE", "RED", "ECHO", "EXT"] }

    # Echo proof edge: forbid WAVE from node-2 to node-3, but still allow ECHO/EXT
    { from = "node-2", to = "node-3", allow = ["CONTROL", "WHITE", "RED", "ECHO", "EXT"] }
    { from = "node-2", to = "node-4", allow = ["CONTROL", "WHITE", "RED", "WAVE", "ECHO", "EXT"] }
    { from = "node-2", to = "node-5", allow = ["CONTROL", "WHITE", "RED", "WAVE", "ECHO", "EXT"] }

    { from = "node-3", to = "node-2", allow = ["CONTROL", "WHITE", "RED", "WAVE", "ECHO", "EXT"] }
    { from = "node-3", to = "node-4", allow = ["CONTROL", "WHITE", "RED", "WAVE", "ECHO", "EXT"] }

    # Lai–Yang proof edge: forbid WHITE from node-3 to node-5
    { from = "node-3", to = "node-5", allow = ["CONTROL", "RED", "WAVE", "ECHO", "EXT"] }

    { from = "node-4", to = "node-2", allow = ["CONTROL", "WHITE", "RED", "WAVE", "ECHO", "EXT"] }
    { from = "node-4", to = "node-3", allow = ["CONTROL", "WHITE", "RED", "WAVE", "ECHO", "EXT"] }
    { from = "node-4", to = "node-5", allow = ["CONTROL", "WHITE", "RED", "WAVE", "ECHO", "EXT"] }

    { from = "node-5", to = "node-2", allow = ["CONTROL", "WHITE", "RED", "WAVE", "ECHO", "EXT"] }
    { from = "node-5", to = "node-3", allow = ["CONTROL", "WHITE", "RED", "WAVE", "ECHO", "EXT"] }

    # Lai–Yang proof edge: forbid RED from node-5 to node-4
    { from = "node-5", to = "node-4", allow = ["CONTROL", "WHITE", "WAVE", "ECHO", "EXT"] }
  ]
}