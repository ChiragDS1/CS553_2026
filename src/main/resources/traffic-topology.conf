# Traffic topology — complete self-contained config for CLI injection experiments.
#
# Contains both sim.graph (topology) and sim.traffic (timer + input nodes)
# so it works with: --config conf/traffic-topology.conf
#
# Timer nodes:
#   node-1 ticks every 200ms, samples kind from its explicit PDF (PING=60%)
#   node-4 ticks every 400ms, always sends WORK (fixed mode)
#
# Input nodes (accept injected messages via --inject-file or --interactive):
#   node-2, node-3

sim.graph {
  nodes = [
    {
      id = "node-1"
      pdf {
        family = "explicit"
        weights {
          PING   = 0.60
          GOSSIP = 0.30
          WORK   = 0.10
        }
      }
    },
    {
      id = "node-2"
      pdf {
        family = "uniform"
        messageTypes = ["PING", "GOSSIP", "WORK"]
      }
    },
    {
      id = "node-3"
      pdf {
        family = "zipf"
        messageTypes = ["PING", "GOSSIP", "WORK"]
        exponent = 1.2
      }
    },
    {
      id = "node-4"
      pdf {
        family = "explicit"
        weights {
          PING   = 0.20
          GOSSIP = 0.20
          WORK   = 0.60
        }
      }
    },
    {
      id = "node-5"
      pdf {
        family = "uniform"
        messageTypes = ["PING", "GOSSIP", "WORK"]
      }
    }
  ]

  edges = [
    { from = "node-1", to = "node-2", allow = ["PING", "GOSSIP", "WORK"] }
    { from = "node-1", to = "node-3", allow = ["PING", "GOSSIP"] }
    { from = "node-1", to = "node-4", allow = ["PING", "WORK"] }
    { from = "node-1", to = "node-5", allow = ["PING"] }

    { from = "node-2", to = "node-1", allow = ["PING", "GOSSIP", "WORK"] }
    { from = "node-2", to = "node-3", allow = ["PING", "WORK"] }
    { from = "node-2", to = "node-4", allow = ["GOSSIP", "WORK"] }
    { from = "node-2", to = "node-5", allow = ["PING", "GOSSIP"] }

    { from = "node-3", to = "node-1", allow = ["PING", "WORK"] }
    { from = "node-3", to = "node-2", allow = ["PING", "GOSSIP", "WORK"] }
    { from = "node-3", to = "node-4", allow = ["WORK"] }
    { from = "node-3", to = "node-5", allow = ["GOSSIP"] }

    { from = "node-4", to = "node-1", allow = ["WORK"] }
    { from = "node-4", to = "node-2", allow = ["PING", "WORK"] }
    { from = "node-4", to = "node-3", allow = ["PING", "GOSSIP", "WORK"] }
    { from = "node-4", to = "node-5", allow = ["WORK", "GOSSIP"] }

    { from = "node-5", to = "node-1", allow = ["PING"] }
    { from = "node-5", to = "node-2", allow = ["PING", "GOSSIP"] }
    { from = "node-5", to = "node-3", allow = ["WORK"] }
    { from = "node-5", to = "node-4", allow = ["PING", "GOSSIP", "WORK"] }
  ]
}

sim.traffic {
  seed = 42

  timers = [
    { node = "node-1", tickEveryMs = 200, mode = "pdf" },
    { node = "node-4", tickEveryMs = 400, mode = "fixed", fixedMsg = "WORK" }
  ]

  inputs = [
    { node = "node-2" },
    { node = "node-3" }
  ]
}